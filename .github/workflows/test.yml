on:
  pull_request:
  push:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  flake-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        url: [
            "denful/den/v0.16.0",
            "denful/den/v0.17.0",
            "musjj/den/arbitrary-fixes",
          ] # Add other releases, `latest` or commits
    name: Den (url ${{matrix.url}})
    runs-on: ${{matrix.os}}
    steps:
      - uses: wimpysworld/nothing-but-nix@main
        if: matrix.os == 'ubuntu-latest'
      - uses: cachix/install-nix-action@v31
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - uses: actions/checkout@v5
      - run: sed -i 's#musjj/den/arbitrary-fixes#${{matrix.url}}#' flake.nix
        if: matrix.os == 'ubuntu-latest'
      - run: sed -i '' 's#musjj/den/arbitrary-fixes#${{matrix.url}}#' flake.nix
        if: matrix.os == 'macos-latest'
      - run: nix flake update den
      - run: nix flake metadata
      - run: nix flake check
